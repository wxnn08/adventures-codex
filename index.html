<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adventure's Codex — D&D 5e Character Sheet</title>
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #ede0c4; }
    body { font-family: 'EB Garamond', Georgia, serif; }
    * { box-sizing: border-box; }
    input::placeholder, textarea::placeholder {
      color: rgba(107,68,35,0.35);
      font-style: italic;
    }
    textarea { font-family: inherit; }
    button { font-family: inherit; }
    @keyframes tipFade {
      from { opacity: 0; transform: translate(-50%, var(--tip-y, 0)) scale(0.96); }
      to   { opacity: 1; transform: translate(-50%, var(--tip-y, 0)) scale(1); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
